        ><button class="button" role="button">Join</button></a
      >
    </main>
    <script>
      var i = 0;
      var txt = "Welcome To The Wired";
      var speed = 70;
      function typeWriter() {
        if (i < txt.length) {
          document.getElementById("type").innerHTML += txt.charAt(i);
          i++;
          setTimeout(typeWriter, speed);
        }
      }
    </script>
